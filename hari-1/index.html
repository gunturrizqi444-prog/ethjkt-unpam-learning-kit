<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poké Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffcb05,#ff7eb3,#3d7dca);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffcb05,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 14px; }
  .card {
    width: 220px; height: 250px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative; overflow: hidden;
  }
  .card .sprite {
    width: 190px; height: 190px; object-fit: contain;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,.55)); display: none;
  }
  .card .placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card .placeholder .emoji { font-size: 74px; line-height: 1; }
  .card .placeholder .ph-text { font-size: 14px; color: #8b90b0; letter-spacing: 1px; }

  /* spinner loading */
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.15); border-top-color: #ffcb05;
    animation: spin 0.8s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .shiny-badge {
    position: absolute; top: 10px; right: 10px; display: none;
    font-size: 11px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(90deg,#ffe58a,#ffd24a); color: #4a3b00;
    padding: 3px 8px; border-radius: 8px;
  }

  /* warna per rarity (border kartu) */
  .card.common { border-color: #6b7280; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  /* info Pokémon di bawah kartu */
  .poke-info { min-height: 92px; margin-bottom: 8px; }
  .poke-name { font-size: 19px; font-weight: 800; }
  .poke-name .dex { font-size: 13px; color: #8b90b0; font-weight: 600; }
  .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .rar.common { color: #9aa3b2; }
  .rar.rare   { color: #4da6ff; }
  .rar.epic   { color: #c88bff; }
  .rar.ssr    { color: #ffd24a; }

  .types { display: flex; gap: 6px; justify-content: center; margin: 8px 0 4px; min-height: 22px; }
  .type-badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
  }

  /* panel stat dasar */
  .stats-panel { display: grid; gap: 4px; margin-top: 8px; text-align: left; }
  .stat-row { display: grid; grid-template-columns: 42px 30px 1fr; align-items: center; gap: 8px; font-size: 11px; }
  .stat-row .s-lbl { color: #8b90b0; text-transform: uppercase; letter-spacing: .5px; }
  .stat-row .s-val { color: #eaeaf0; font-weight: 700; text-align: right; }
  .stat-bar { height: 7px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
  .stat-bar > span { display: block; height: 100%; border-radius: 5px; background: linear-gradient(90deg,#4da6ff,#7ee8ff); transition: width .4s ease; }

  .buttons { display: flex; gap: 12px; margin: 14px 0 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }
  .btn:disabled { opacity: .5; cursor: not-allowed; filter: grayscale(.3); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 40px; }
  .chip {
    width: 40px; height: 40px; border-radius: 9px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip img { width: 100%; height: 100%; object-fit: contain; }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
  .chip.shiny { box-shadow: 0 0 10px rgba(255,229,138,.9); }

  .err { color: #ff8a8a; font-size: 12px; min-height: 16px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="app">
    <h1>POKÉ GACHA</h1>
    <div class="subtitle">tarik Pokémon asli — data langsung dari PokeAPI</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">Legendary</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke Legendary gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <div class="spinner" id="spinner"></div>
        <img class="sprite" id="sprite" alt="">
        <div class="shiny-badge" id="shinyBadge">✨ SHINY</div>
        <div class="placeholder" id="placeholder">
          <div class="emoji">⚪</div>
          <div class="ph-text">Tekan PULL</div>
        </div>
      </div>
    </div>

    <div class="poke-info">
      <div class="poke-name"><span id="pokeName">—</span> <span class="dex" id="dexNum"></span></div>
      <div class="types" id="types"></div>
      <div class="rar" id="rarity"></div>
      <div class="stats-panel" id="statsPanel"></div>
    </div>

    <div class="err" id="err"></div>

    <div class="buttons">
      <button class="btn" id="tarik1">PULL 1x</button>
      <button class="btn gold" id="tarik10">PULL 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  // ==========================================================
  // POKÉ GACHA - HARI 1
  // Simulator gacha yang menarik Pokémon ASLI dari PokeAPI.
  //
  // File ini dibangun bertahap (lihat LOG.md):
  //   1) Mesin rarity + pity (lokal, tanpa internet)  <-- BAGIAN INI
  //   2) Lapisan ambil data PokeAPI (fetch + cache)
  //   3) Render kartu Pokémon (artwork, tipe, stat, shiny)
  // ==========================================================

  // ---------- Konfigurasi rarity & pity ----------
  const PITY_MAX = 10; // tarikan ke-10 dijamin Legendary (SSR) kalau belum dapat

  // Peluang tiap tier (dicek berurutan): SSR 3%, EPIC 10%, RARE 30%, sisanya COMMON.
  const RATE_SSR = 0.03;
  const RATE_EPIC = 0.10;
  const RATE_RARE = 0.30;

  // ---------- State permainan ----------
  let pity = 0;      // tarikan sejak Legendary terakhir
  let total = 0;     // total tarikan
  let ssrCount = 0;  // total Legendary/Mythical didapat

  // ---------- Elemen DOM ----------
  const el = {
    card: document.getElementById("card"),
    spinner: document.getElementById("spinner"),
    sprite: document.getElementById("sprite"),
    shinyBadge: document.getElementById("shinyBadge"),
    placeholder: document.getElementById("placeholder"),
    pokeName: document.getElementById("pokeName"),
    dexNum: document.getElementById("dexNum"),
    types: document.getElementById("types"),
    rarity: document.getElementById("rarity"),
    statsPanel: document.getElementById("statsPanel"),
    total: document.getElementById("total"),
    ssrCount: document.getElementById("ssrCount"),
    pityText: document.getElementById("pityText"),
    pityFill: document.getElementById("pityFill"),
    history: document.getElementById("history"),
    err: document.getElementById("err"),
    tarik1: document.getElementById("tarik1"),
    tarik10: document.getElementById("tarik10"),
  };

  // ---------- Mesin rarity ----------
  // Menentukan tier tanpa mengubah state (biar aman kalau fetch gagal nanti).
  function decideRarity() {
    const acak = Math.random();
    // "+1" karena tarikan ini belum masuk hitungan pity.
    if (pity + 1 >= PITY_MAX || acak < RATE_SSR) return "ssr";
    if (acak < RATE_EPIC) return "epic";
    if (acak < RATE_RARE) return "rare";
    return "common";
  }

  // Baru dicatat setelah tarikan benar-benar berhasil.
  function commitCounters(kelas) {
    total += 1;
    pity += 1;
    if (kelas === "ssr") { pity = 0; ssrCount += 1; }
  }

  // ---------- Update panel statistik & pity bar ----------
  function updateStats() {
    el.total.textContent = total;
    el.ssrCount.textContent = ssrCount;
    el.pityText.textContent = pity + " / " + PITY_MAX;
    el.pityFill.style.width = (pity / PITY_MAX) * 100 + "%";
  }

  // ---------- Render sementara (BAGIAN 1: masih placeholder) ----------
  // Untuk sekarang belum ada gambar Pokémon; kita cuma pamerkan tier-nya.
  // Bagian 3 nanti mengganti ini dengan artwork + tipe + stat asli.
  function renderPlaceholder(kelas) {
    el.placeholder.style.display = "flex";
    el.sprite.style.display = "none";
    el.pokeName.textContent = "???";
    el.dexNum.textContent = "";
    el.types.innerHTML = "";
    el.statsPanel.innerHTML = "";

    el.rarity.textContent = kelas;
    el.rarity.className = "rar " + kelas;

    // Trik reset animasi: hapus kelas, paksa reflow, pasang lagi.
    el.card.className = "card";
    void el.card.offsetWidth;
    el.card.className = "card " + kelas + " reveal";
  }

  // Chip riwayat sederhana (dot warna) untuk Bagian 1.
  function addHistoryDot(kelas) {
    const chip = document.createElement("div");
    chip.className = "chip " + kelas;
    el.history.prepend(chip);
    while (el.history.children.length > 12) {
      el.history.removeChild(el.history.lastChild);
    }
  }

  // ---------- Satu tarikan ----------
  function pull() {
    const kelas = decideRarity();
    commitCounters(kelas);
    updateStats();
    renderPlaceholder(kelas);
    addHistoryDot(kelas);
  }

  // ---------- Tombol ----------
  el.tarik1.addEventListener("click", () => pull());
  el.tarik10.addEventListener("click", () => {
    for (let i = 0; i < 10; i++) pull();
  });
</script>
</body>
</html>
